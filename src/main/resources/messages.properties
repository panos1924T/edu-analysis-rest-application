# ============================================================
# Validation messages  -  English (default)
# Key format: {AnnotationName}.{modelAttributeName}.{fieldName}
# For @Size: {1}=max, {2}=min  (Spring passes attributes alphabetically)
# ============================================================

# ------------------------------------------------------------
# AnalystInsertDTO
# ------------------------------------------------------------
NotNull.analystInsertDTO.firstname                      = First name is required
Size.analystInsertDTO.firstname                         = First name must be at least {2} characters long
NotNull.analystInsertDTO.lastname                       = Last name is required
Size.analystInsertDTO.lastname                          = Last name must be at least {2} characters long
NotNull.analystInsertDTO.email                          = Email is required
NotNull.analystInsertDTO.firmId                         = Firm is required
NotNull.analystInsertDTO.userInsertDTO                  = User account information is required
NotNull.analystInsertDTO.personalInfoInsertDTO          = Personal information is required

# ------------------------------------------------------------
# AnalystUpdateDTO
# ------------------------------------------------------------
NotNull.analystUpdateDTO.uuid                           = Analyst identifier (UUID) is required
NotNull.analystUpdateDTO.firstname                      = First name is required
Size.analystUpdateDTO.firstname                         = First name must be at least {2} characters long
NotNull.analystUpdateDTO.lastname                       = Last name is required
Size.analystUpdateDTO.lastname                          = Last name must be at least {2} characters long
NotNull.analystUpdateDTO.email                          = Email is required
NotNull.analystUpdateDTO.firmId                         = Firm is required
NotNull.analystUpdateDTO.userUpdateDTO                  = User account information is required
NotNull.analystUpdateDTO.personalInfoUpdateDTO          = Personal information is required

# ------------------------------------------------------------
# UserInsertDTO
# ------------------------------------------------------------
NotNull.userInsertDTO.username                          = Username is required
Size.userInsertDTO.username                             = Username must be between {2} and {1} characters
NotNull.userInsertDTO.password                          = Password is required
Pattern.userInsertDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)
NotNull.userInsertDTO.roleId                            = User role is required

# ------------------------------------------------------------
# UserUpdateDTO
# ------------------------------------------------------------
NotNull.userUpdateDTO.username                          = Username is required
Size.userUpdateDTO.username                             = Username must be between {2} and {1} characters
NotNull.userUpdateDTO.password                          = Password is required
Pattern.userUpdateDTO.password                          = Password must be at least 8 characters and include at least one digit, one lowercase letter, one uppercase letter, and one special character (!@#$%^&+=)

# ------------------------------------------------------------
# PersonalInfoInsertDTO
# ------------------------------------------------------------
NotBlank.personalInfoInsertDTO.identityNumber             = Identity number is required
NotBlank.personalInfoInsertDTO.placeOfBirth               = Place of birth is required
NotBlank.personalInfoInsertDTO.municipalityOfRegistration = Municipality of registration is required

