# Database settings
spring.datasource.url=jdbc:postgresql://${PG_HOST:localhost}:${PG_PORT:5433}/${PG_DB:edu-analysis-db}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

debug=true

# JPA settings
spring.jpa.hibernate.ddl-auto=validate
#spring.jpa.show-sql=true
#spring.jpa.properties.hibernate.format_sql=true

# Schema - tell Hibernate to use the specified schema
spring.jpa.properties.hibernate.default_schema=analysisapp
spring.flyway.default-schema=analysisapp

# Flyway - tell Flyway to use the specified schema
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.schemas=analysisapp

# make sure to use JOIN FETCH or EntityGraph
spring.jpa.open-in-view=false

